name: Publish docker images

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

env:
  REGISTRY: docker.io
  IMAGE_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE }}

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.collect.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6

      - id: collect
        run: |
          python3 <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path

          include = []
          for dockerfile in sorted(Path(".").rglob("Dockerfile")):
              if ".git" in dockerfile.parts or ".github" in dockerfile.parts:
                  continue

              include.append(
                  {
                      "context": ".",
                      "dockerfile": dockerfile.as_posix(),
                      "image": dockerfile.parent.name,
                  }
              )

          if not include:
              raise SystemExit("No Dockerfiles found.")

          print(f"matrix={json.dumps({'include': include}, separators=(',', ':'))}")
          PY

  publish:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.discover.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest
            type=sha,format=short,prefix=sha-

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
